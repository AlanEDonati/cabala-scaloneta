<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - La Scaloneta</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <h1>Panel de Administración 🏆</h1>
    <div class="menu">
        <button onclick="window.location.href='index.html'">Volver a la App</button>
    </div>

    <div class="container">
        <h2>Cargar Resultado Final</h2>
        <p>Elegí el partido que terminó y poné el resultado real para repartir los puntos.</p>
        
        <label>Partido:</label>
        <select id="matchSelectAdmin"></select>

        <div class="container admin-card">
    <h2>📦 Cargar Nuevo Producto</h2>
    <div class="form-group">
        <input type="text" id="prodName" placeholder="Nombre del producto (Ej: Camiseta)">
        <input type="number" id="prodPrice" placeholder="Precio (Ej: 85000)">
        <input type="text" id="prodImg" placeholder="URL de la imagen">
        <select id="prodCat">
            <option value="indumentaria">Indumentaria</option>
            <option value="accesorios">Accesorios</option>
            <option value="coleccionables">Coleccionables</option>
        </select>
        <button onclick="subirProducto()">Publicar en el Store</button>
    </div>
</div>

        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="number" id="finalScoreA" placeholder="Goles A">
            <span>-</span>
            <input type="number" id="finalScoreB" placeholder="Goles B">
        </div>

        <button onclick="guardarResultadoFinal()" style="background: #d4ac0d; margin-top: 20px;">
            ¡REPARTIR PUNTOS!
        </button>
    </div>

<div class="container" style="margin-top: 30px;">
    <h2>🛒 Gestionar Productos del Store</h2>
    <p>Acá podés ver lo que hay cargado y borrar los que tengan links rotos.</p>
    <div id="lista-productos-admin" class="admin-card">
        Cargando productos...
    </div>
</div>

    <script>
        // Cargar los partidos al inicio
        async function cargarPartidosAdmin() {
            const res = await fetch("/matches");
            const partidos = await res.json();
            const select = document.getElementById("matchSelectAdmin");
            partidos.forEach(m => {
                const opt = document.createElement("option");
                opt.value = m.id;
                opt.innerText = `${m.team_a} vs ${m.team_b} ${m.score_a !== null ? '(Ya tiene resultado)' : ''}`;
                select.appendChild(opt);
            });
        }

        async function guardarResultadoFinal() {
            const match_id = document.getElementById("matchSelectAdmin").value;
            const score_a = document.getElementById("finalScoreA").value;
            const score_b = document.getElementById("finalScoreB").value;

            if(score_a === "" || score_b === "") return alert("Faltan los goles, socio");

            const res = await fetch("/set-result", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ match_id, score_a, score_b })
            });

            if(res.ok) {
                alert("¡Resultado guardado! Los puntos se actualizaron en el Ranking.");
                location.reload();
            }
        }

        cargarPartidosAdmin();

        async function subirProducto() {
    const name = document.getElementById("prodName").value;
    const price = document.getElementById("prodPrice").value;
    const image_url = document.getElementById("prodImg").value;
    const category = document.getElementById("prodCat").value;

    if (!name || !price || !image_url) return alert("Completá todos los campos, che.");

    const res = await fetch("/products", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, price, image_url, category })
    });

  if (res.ok) {
        alert("¡Producto cargado con éxito! Ya se ve en el Store.");
        
        // 1. Limpiamos los campos del formulario
        document.getElementById("prodName").value = "";
        document.getElementById("prodPrice").value = "";
        document.getElementById("prodImg").value = "";
        
        // 2. LLAMAMOS A LA LISTA (Para que aparezca el nuevo producto abajo con su botón de borrar)
        listarProductosAdmin(); 
        
    } else {
        alert("Error al cargar el producto.");
    }
        }

        
// Función para listar los productos y ponerles el botón de eliminar
async function listarProductosAdmin() {
    try {
        const res = await fetch("/products");
        const productos = await res.json();
        const lista = document.getElementById("lista-productos-admin");
        
        lista.innerHTML = ""; // Limpiamos

        if (productos.length === 0) {
            lista.innerHTML = "<p>No hay productos en el store.</p>";
            return;
        }

        productos.forEach(p => {
            const div = document.createElement("div");
            div.style = "border-bottom: 1px solid #444; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); margin-bottom: 5px; border-radius: 8px;";
            div.innerHTML = `
                <div>
                    <span style="color: #d4ac0d; font-weight: bold;">${p.name}</span> 
                    <br>
                    <small style="color: #ccc;">$${Number(p.price).toLocaleString('es-AR')}</small>
                </div>
                <button onclick="eliminarProducto(${p.id})" style="background: #ff4444; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;">
                    ELIMINAR
                </button>
            `;
            lista.appendChild(div);
        });
    } catch (error) {
        console.error("Error al listar:", error);
    }
}

// Función que manda la orden de borrar al servidor
async function eliminarProducto(id) {
    if (!confirm("¿Seguro que querés borrar este producto? No se puede deshacer.")) return;

    try {
        const res = await fetch(`/products/${id}`, { method: "DELETE" });
        if (res.ok) {
            alert("¡Producto eliminado!");
            listarProductosAdmin(); // Refrescamos la lista sin recargar la página
        } else {
            alert("No se pudo borrar el producto.");
        }
    } catch (error) {
        console.error("Error:", error);
    }
}

// Llamamos a la función cuando carga la página para ver la lista inicial
listarProductosAdmin();

    </script>
</body>
</html>
