<!DOCTYPE html>
<html>

<head>
<title>La Cábala de la Scaloneta</title>
<meta charset="UTF-8">

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    /* CAMBIO 1: El fondo es un degradado Celeste y Blanco, como la bandera */
    background: linear-gradient(135deg, #a7d8f5 0%, #ffffff 50%, #a7d8f5 100%);
    background-attachment: fixed;
    color: #0a2342;
    margin: 0;
    padding-bottom: 50px;
}

h1 {
    /* CAMBIO 2: Título en AZUL OSCURO de la selección, letras en DORADO y efecto de sombra */
    background-color: #03254c; 
    color: #f1c40f; /* Color Oro */
    padding: 20px;
    margin: 0;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    border-bottom: 5px solid #f1c40f; /* Franja dorada */
}

.menu {
    /* CAMBIO 3: Menú un poco más ancho y el mismo azul oscuro */
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    background: #03254c;
    padding: 20px 10px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.menu button {
    /* CAMBIO 4: Botones del menú con bordes Celestes, más suaves y elegantes */
    background: transparent !important;
    border: 2px solid #a7d8f5 !important;
    color: #a7d8f5 !important;
    padding: 10px 20px !important;
    margin: 0 !important;
    width: auto !important;
    border-radius: 25px !important; /* Más redondeados, estilo "píldora" */
    font-size: 15px !important;
    box-shadow: none !important;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.menu button:hover {
    background: #a7d8f5 !important;
    color: #03254c !important;
}

.container {
    max-width: 450px;
    margin: 40px auto;
    /* CAMBIO 5: Tarjeta blanca más suave y con bordes más redondeados. Parecerá que flota */
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15); /* Sombra más pronunciada */
    color: #333;
}

h2 {
    /* CAMBIO 6: Subtítulos en azul oscuro y con una línea celeste más sutil */
    color: #03254c;
    border-bottom: 2px solid #a7d8f5;
    padding-bottom: 8px;
    margin-top: 25px;
}

input, select {
    padding: 14px;
    margin: 12px 0;
    width: calc(100% - 28px);
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 16px;
    transition: 0.3s;
}

input:focus, select:focus {
    border-color: #a7d8f5;
    outline: none;
    box-shadow: 0 0 5px rgba(167, 216, 245, 0.5);
}

button {
    /* CAMBIO 7: El botón de acción es CELESTE para que combine, no verde. */
    background: #a7d8f5;
    color: #03254c; /* Texto azul oscuro para contraste */
    padding: 14px;
    border: none;
    border-radius: 10px;
    width: 100%;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    /* Sombra celeste para dar efecto de relieve */
    box-shadow: 0 4px 0 #89c4eb;
    transition: 0.2s;
}

button:active {
    box-shadow: 0 0 0;
    transform: translateY(4px);
}

ul {
    list-style: none;
    padding: 0;
}

li {
    /* CAMBIO 8: Listas con fondo azul muy clarito y el borde celeste más grueso. Parecen tarjetas. */
    background: #f1f8fd;
    margin: 10px 0;
    padding: 15px;
    border-left: 6px solid #a7d8f5;
    border-radius: 6px;
    text-align: left;
    font-weight: 500;
}
</style>

</head>

<body>

<h1>La Cábala de la Scaloneta ⚽</h1>

<div class="menu">

<button onclick="mostrarSeccion('home')">Inicio</button>

<button onclick="mostrarSeccion('predicciones')">Predicciones</button>

<button onclick="mostrarSeccion('cabalas')">Cábalas</button>

<button onclick="mostrarSeccion('ranking')">Ranking</button>

<button onclick="mostrarSeccion('store')">Store</button>

</div>

<div class="container">

<div id="home">

<h2>Crear usuario</h2>

<input id="username" placeholder="Tu nombre de hincha">
<button onclick="crearUsuario()">Crear</button>

<h2>Usuarios</h2>

<button onclick="cargarUsuarios()">Ver usuarios</button>
<ul id="listaUsuarios"></ul>

</div>


<div id="predicciones" style="display:none">

<h2>Partidos</h2>

<button onclick="cargarPartidos()">Ver partidos</button>
<ul id="listaPartidos"></ul>

<h2>Tu predicción</h2>

<select id="matchSelect"></select>

<input id="scoreA" placeholder="Goles Argentina">
<input id="scoreB" placeholder="Goles rival">

<button onclick="enviarPrediccion()">Enviar predicción</button>
</div>


<div id="cabalas" style="display:none">

<h2>Cábalas del hincha 🧿</h2>

<input id="cabalaInput" placeholder="Escribe tu cábala">

<button onclick="guardarCabala()">Guardar cábala</button>

<button onclick="verCabalas()">Ver cábalas</button>

<ul id="listaCabalas"></ul>

</div>


<div id="ranking" style="display:none">

<h2>Ranking de hinchas 🏆</h2>

<button onclick="verRanking()">Ver ranking</button>

<ul id="listaRanking"></ul>

</div>


<div id="store" style="display:none">

<h2>Tienda de la Scaloneta 🛍</h2>

<p>Merch mundialero pronto.</p>

</div>

</div>
<script>

async function crearUsuario(){

const username = document.getElementById("username").value

const res = await fetch("/users",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
})

const user = await res.json()

localStorage.setItem("user_id", user.id)

alert("Usuario creado. Tu ID es " + user.id)

}

async function cargarUsuarios(){

const res=await fetch("/users")
const users=await res.json()

const lista=document.getElementById("listaUsuarios")

lista.innerHTML=""

users.forEach(u=>{
const li=document.createElement("li")
li.textContent=u.username
lista.appendChild(li)
})

}

async function cargarPartidos(){

const res=await fetch("/matches")
const matches=await res.json()

const lista=document.getElementById("listaPartidos")

lista.innerHTML=""

matches.forEach(m=>{
const li=document.createElement("li")
li.textContent=m.team_a + " vs " + m.team_b
lista.appendChild(li)
})

}

async function enviarPrediccion(){

const scoreA = document.getElementById("scoreA").value
const scoreB = document.getElementById("scoreB").value
const match_id = document.getElementById("matchSelect").value

await fetch("/predictions",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id: localStorage.getItem("user_id"),
match_id:match_id,
score_a:scoreA,
score_b:scoreB
})
})
alert("Predicción enviada ⚽")

}


function mostrarSeccion(seccion){
    const secciones = ["home","predicciones","cabalas","ranking","store"];
    
    secciones.forEach(s => {
        document.getElementById(s).style.display = "none";
    });

    document.getElementById(seccion).style.display = "block";

    // CARGA AUTOMÁTICA AL ENTRAR
    if(seccion === 'ranking') verRanking();
    if(seccion === 'cabalas') verCabalas();
    if(seccion === 'predicciones') cargarPartidos();
}
async function guardarCabala(){

const descripcion=document.getElementById("cabalaInput").value

await fetch("/cabalas",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id: localStorage.getItem("user_id"),
descripcion:descripcion
})
})

alert("Cábala guardada 🧿")

}


async function verCabalas(){

const res=await fetch("/cabalas")

const cabalas=await res.json()

const lista=document.getElementById("listaCabalas")

lista.innerHTML=""

cabalas.forEach(c=>{

const li=document.createElement("li")

li.textContent = c.username + ": " + c.descripcion

lista.appendChild(li)

})
}

async function verRanking(){

  const res = await fetch("/ranking")
  const ranking = await res.json()
  const lista = document.getElementById("listaRanking")

  lista.innerHTML=""

  ranking.forEach(r=>{
    const li = document.createElement("li")
    
    // Aquí está el cambio: (r.puntos || 0) para evitar errores si no tiene puntos
    li.textContent = r.username + " - " + (r.puntos || 0) + " puntos"

    lista.appendChild(li)
  })

}

async function cargarSelectorPartidos(){

const res = await fetch("/matches")
const matches = await res.json()

const select = document.getElementById("matchSelect")

select.innerHTML = ""

matches.forEach(m => {

const option = document.createElement("option")

option.value = m.id
option.textContent = m.team_a + " vs " + m.team_b

select.appendChild(option)

})

}

window.onload = function(){

cargarSelectorPartidos()

}
</script>

</body>
</html>
